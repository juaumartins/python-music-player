
name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Conferir versão do Python
        run: |
          python --version
          which python

      - name: Instalar dependências do sistema
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip python3-setuptools python3-wheel \
            build-essential autoconf automake libtool pkg-config \
            zlib1g-dev libffi-dev libssl-dev \
            libltdl-dev ccache gettext cmake

      - name: Instalar Buildozer
        run: |
          python -m pip install --upgrade pip
          python -m pip install "cython==0.29.36" "buildozer==1.5.0"

      - name: Limpar build anterior
        run: |
          rm -rf .buildozer bin

      - name: Gerar APK Android
        run: |
          yes | buildozer -v android debug

      - name: Enviar APK para download
        uses: actions/upload-artifact@v4
        with:
          name: music-player-apk
          path: bin/*.apk
